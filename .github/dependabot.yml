version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      cargo-minor-and-patch:
        update-types: [minor, patch]
    commit-message:
      prefix: "chore(deps)"
      include: scope
    labels: [dependencies, rust]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: "chore(ci)"
    labels: [dependencies, ci]
